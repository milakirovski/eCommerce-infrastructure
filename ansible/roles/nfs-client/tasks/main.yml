---
- name: Install NFS client utilities
  apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Create NFS mount point
  file:
    path: "{{ nfs_mount_path }}"
    state: directory
    mode: "0755"

- name: Mount NFS share
  ansible.posix.mount:
    src: "{{ nfs_host }}:{{ nfs_export_path }}"
    path: "{{ nfs_mount_path }}"
    fstype: nfs
    opts: rw,sync,hard,intr
    state: mounted
