---
- name: Install NFS server
  apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Create NFS export directory
  file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0755"

- name: Configure NFS exports
  lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_path }} {{ nfs_network }}(rw,sync,no_subtree_check,no_root_squash)"
    regexp: "^{{ nfs_export_path | regex_escape }}\\s"
    state: present
    create: true
  notify: re-export nfs shares

- name: Enable and start NFS server
  systemd:
    name: nfs-kernel-server
    enabled: true
    state: started
