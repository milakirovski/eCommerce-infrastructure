---
# ── System dependencies ───────────────────────────────────────────────────────

- name: Install prerequisites for deadsnakes PPA
  apt:
    name: software-properties-common
    state: present
    update_cache: true

- name: Add deadsnakes PPA for Python {{ python_version }}
  apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
    update_cache: true

- name: Install system packages
  apt:
    name:
      - "python{{ python_version }}"
      - "python{{ python_version }}-venv"
      - "python{{ python_version }}-dev"
      - "python{{ python_version }}-distutils"
      - git
      - libpq-dev       # required to compile psycopg2
      - build-essential
      - pkg-config
    state: present

# ── App user & directories ────────────────────────────────────────────────────

- name: Create app system group
  group:
    name: "{{ app_group }}"
    system: true
    state: present

- name: Create app system user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /bin/bash
    home: "{{ app_base_dir }}"
    create_home: true

- name: Add www-data to app group so Nginx can read static/media files
  user:
    name: www-data
    groups: "{{ app_group }}"
    append: true

- name: Ensure base directory is world-traversable
  file:
    path: "{{ app_base_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_static_dir }}"
    - "{{ app_media_dir }}"
    - /var/log/ecommerce

- name: Create gunicorn runtime directory
  file:
    path: "{{ gunicorn_socket | dirname }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

# ── Clone repository ──────────────────────────────────────────────────────────

- name: Clone application repository
  git:
    repo: "{{ app_git_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_git_branch }}"
    force: false
  become_user: "{{ app_user }}"
  notify: restart gunicorn

# ── Python virtualenv & dependencies ─────────────────────────────────────────

- name: Create Python {{ python_version }} virtualenv
  command: "python{{ python_version }} -m venv {{ app_venv_dir }}"
  args:
    creates: "{{ app_venv_dir }}/bin/activate"
  become_user: "{{ app_user }}"

- name: Upgrade pip inside virtualenv
  pip:
    name: pip
    state: latest
    virtualenv: "{{ app_venv_dir }}"
    virtualenv_python: "python{{ python_version }}"
  become_user: "{{ app_user }}"

- name: Install Python requirements
  pip:
    requirements: "{{ django_requirements }}"
    virtualenv: "{{ app_venv_dir }}"
    virtualenv_python: "python{{ python_version }}"
    extra_args: "--upgrade"
  become_user: "{{ app_user }}"
  notify: restart gunicorn

- name: Install extra packages (psycopg2, gunicorn, django-redis)
  pip:
    name:
      - psycopg2-binary
      - "gunicorn>=20.1,<23"
      - dj-database-url
      - django-redis
      - "django-storages<1.14"
    virtualenv: "{{ app_venv_dir }}"
    virtualenv_python: "python{{ python_version }}"
  become_user: "{{ app_user }}"

# ── Django deployment settings (overrides the AWS S3 config in base.py) ──────

- name: Write deployment settings module
  template:
    src: django_deployment_settings.py.j2
    dest: "{{ django_project_dir }}/ecommerce/settings/deployment.py"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  notify: restart gunicorn

# ── Environment file (.env) ───────────────────────────────────────────────────

- name: Write .env file with secrets
  template:
    src: django_env.j2
    dest: "{{ app_base_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  notify: restart gunicorn

# ── Django management commands ────────────────────────────────────────────────

- name: Run database migrations
  django_manage:
    command: migrate
    app_path: "{{ django_project_dir }}"
    virtualenv: "{{ app_venv_dir }}"
    settings: "{{ django_settings_module }}"
  environment:
    DJANGO_SECRET_KEY: "{{ django_secret_key }}"
    DATABASE_URL: "postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
  become_user: "{{ app_user }}"

- name: Collect static files
  django_manage:
    command: collectstatic
    app_path: "{{ django_project_dir }}"
    virtualenv: "{{ app_venv_dir }}"
    settings: "{{ django_settings_module }}"
  environment:
    DJANGO_SECRET_KEY: "{{ django_secret_key }}"
    DATABASE_URL: "postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
    DJANGO_STATIC_ROOT: "{{ app_static_dir }}"
    DJANGO_MEDIA_ROOT: "{{ app_media_dir }}"
  become_user: "{{ app_user }}"

- name: Make static and media files readable by Nginx
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: www-data
    mode: "0755"
    recurse: true
  loop:
    - "{{ app_static_dir }}"
    - "{{ app_media_dir }}"

# ── Gunicorn systemd service ──────────────────────────────────────────────────

- name: Install gunicorn systemd service
  template:
    src: gunicorn.service.j2
    dest: /etc/systemd/system/ecommerce-gunicorn.service
    mode: "0644"
  notify: restart gunicorn

- name: Enable and start gunicorn
  systemd:
    name: ecommerce-gunicorn
    enabled: true
    state: started
    daemon_reload: true

# ── Nginx reverse proxy for static files + gunicorn ─────────────────────────

- name: Install Nginx on app server
  apt:
    name: nginx
    state: present

- name: Remove default Nginx site
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/conf.d/default.conf
  notify: reload nginx

- name: Write Nginx backend config
  template:
    src: nginx-backend.conf.j2
    dest: /etc/nginx/conf.d/ecommerce-backend.conf
    mode: "0644"
  notify: reload nginx

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: true
    state: started
