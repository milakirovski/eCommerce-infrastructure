---
# ── System dependencies ───────────────────────────────────────────────────────

- name: Install system packages
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - git
      - libpq-dev       # required to compile psycopg2
      - build-essential
      - pkg-config
    state: present
    update_cache: true

# ── App user & directories ────────────────────────────────────────────────────

- name: Create app system user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /bin/bash
    home: "{{ app_base_dir }}"
    create_home: true

- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_static_dir }}"
    - "{{ app_media_dir }}"

- name: Create gunicorn runtime directory
  file:
    path: "{{ gunicorn_socket | dirname }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

# ── Clone repository ──────────────────────────────────────────────────────────

- name: Clone application repository
  git:
    repo: "{{ app_git_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_git_branch }}"
    force: false
  become_user: "{{ app_user }}"
  notify: restart gunicorn

# ── Python virtualenv & dependencies ─────────────────────────────────────────

- name: Create Python virtualenv
  command: python3 -m venv {{ app_venv_dir }}
  args:
    creates: "{{ app_venv_dir }}/bin/activate"
  become_user: "{{ app_user }}"

- name: Upgrade pip inside virtualenv
  pip:
    name: pip
    state: latest
    virtualenv: "{{ app_venv_dir }}"
  become_user: "{{ app_user }}"

- name: Install Python requirements
  pip:
    requirements: "{{ django_requirements }}"
    virtualenv: "{{ app_venv_dir }}"
    extra_args: "--upgrade"
  become_user: "{{ app_user }}"
  notify: restart gunicorn

- name: Install extra packages (psycopg2, gunicorn, django-redis)
  pip:
    name:
      - psycopg2-binary
      - gunicorn
      - dj-database-url
      - django-redis
    virtualenv: "{{ app_venv_dir }}"
  become_user: "{{ app_user }}"

# ── Django deployment settings (overrides the AWS S3 config in base.py) ──────

- name: Write deployment settings module
  template:
    src: django_deployment_settings.py.j2
    dest: "{{ django_project_dir }}/ecommerce/settings/deployment.py"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  notify: restart gunicorn

# ── Environment file (.env) ───────────────────────────────────────────────────

- name: Write .env file with secrets
  template:
    src: django_env.j2
    dest: "{{ app_base_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  notify: restart gunicorn

# ── Django management commands ────────────────────────────────────────────────

- name: Run database migrations
  django_manage:
    command: migrate
    app_path: "{{ django_project_dir }}"
    virtualenv: "{{ app_venv_dir }}"
    settings: "{{ django_settings_module }}"
  environment:
    DJANGO_SECRET_KEY: "{{ django_secret_key }}"
    DATABASE_URL: "postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
  become_user: "{{ app_user }}"

- name: Collect static files
  django_manage:
    command: collectstatic
    app_path: "{{ django_project_dir }}"
    virtualenv: "{{ app_venv_dir }}"
    settings: "{{ django_settings_module }}"
  environment:
    DJANGO_SECRET_KEY: "{{ django_secret_key }}"
    DATABASE_URL: "postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
    DJANGO_STATIC_ROOT: "{{ app_static_dir }}"
    DJANGO_MEDIA_ROOT: "{{ app_media_dir }}"
  become_user: "{{ app_user }}"

# ── Gunicorn systemd service ──────────────────────────────────────────────────

- name: Install gunicorn systemd service
  template:
    src: gunicorn.service.j2
    dest: /etc/systemd/system/ecommerce-gunicorn.service
    mode: "0644"
  notify: restart gunicorn

- name: Enable and start gunicorn
  systemd:
    name: ecommerce-gunicorn
    enabled: true
    state: started
    daemon_reload: true
