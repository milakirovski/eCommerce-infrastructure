---
# ── Self-signed SSL for dev (skip when use_letsencrypt is true) ───────────────

- name: Generate self-signed SSL certificate (dev only)
  command: >
    openssl req -x509 -nodes -days 365
    -newkey rsa:2048
    -keyout {{ ssl_key_path }}
    -out {{ ssl_cert_path }}
    -subj "/C=MK/ST=Skopje/L=Skopje/O=eCommerce/CN={{ lb_domain }}"
  args:
    creates: "{{ ssl_cert_path }}"
  when: not use_letsencrypt

# ── Nginx load balancer configuration ────────────────────────────────────────

- name: Remove default Nginx site
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/conf.d/default.conf
  notify: reload nginx

- name: Write load balancer Nginx config
  template:
    src: nginx-lb.conf.j2
    dest: /etc/nginx/conf.d/ecommerce-lb.conf
    mode: "0644"
  notify: reload nginx

- name: Ensure Nginx is enabled and started
  systemd:
    name: nginx
    enabled: true
    state: started
