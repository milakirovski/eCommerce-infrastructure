---
# ── Node.js ───────────────────────────────────────────────────────────────────

- name: Install Node.js via NodeSource
  block:
    - name: Download NodeSource setup script
      get_url:
        url: "https://deb.nodesource.com/setup_{{ node_version }}.x"
        dest: /tmp/nodesource_setup.sh
        mode: "0755"

    - name: Run NodeSource setup
      command: bash /tmp/nodesource_setup.sh
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

# ── App user & directories ───────────────────────────────────────────────────

- name: Create app system group
  group:
    name: "{{ app_group }}"
    system: true
    state: present

- name: Create app system user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /bin/bash
    home: "{{ app_base_dir }}"
    create_home: true

- name: Ensure base directory is owned by app user
  file:
    path: "{{ app_base_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Clone frontend repository
  git:
    repo: "{{ frontend_git_repo }}"
    dest: "{{ frontend_source_dir }}"
    version: "{{ frontend_git_branch }}"
    force: false
  become_user: "{{ app_user }}"

# ── Build React app ───────────────────────────────────────────────────────────

- name: npm install
  npm:
    path: "{{ frontend_source_dir }}"
    state: present
  become_user: "{{ app_user }}"
  environment:
    VITE_API_URL: "{{ frontend_api_url }}"

- name: npm run build
  command: npm run build
  args:
    chdir: "{{ frontend_source_dir }}"
  become_user: "{{ app_user }}"
  environment:
    VITE_API_URL: "{{ frontend_api_url }}"
  changed_when: true  # always rebuild on deploy

# ── Deploy build artifacts ────────────────────────────────────────────────────

- name: Create web root directory
  file:
    path: "{{ frontend_web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Copy built files to web root
  copy:
    src: "{{ frontend_source_dir }}/dist/"
    dest: "{{ frontend_web_root }}/"
    owner: www-data
    group: www-data
    remote_src: true
  notify: reload nginx

# ── Nginx server block ────────────────────────────────────────────────────────

- name: Write Nginx server block for frontend
  template:
    src: nginx-frontend.conf.j2
    dest: /etc/nginx/conf.d/ecommerce-frontend.conf
    mode: "0644"
  notify: reload nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
