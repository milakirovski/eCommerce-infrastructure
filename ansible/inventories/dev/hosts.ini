# Development inventory — 1 VM per role, matches terraform/environments/dev/main.tf IPs

[lb]
lb1 ansible_host=192.168.100.10

[web]
web1 ansible_host=192.168.100.20

[app]
app1 ansible_host=192.168.100.30

[db_primary]
db1 ansible_host=192.168.100.40

[db_replica]
# empty in dev — no replica

[db:children]
db_primary
db_replica

[cache]
cache1 ansible_host=192.168.100.50

[nfs]
nfs1 ansible_host=192.168.100.60

# Parent group containing all hosts
[ecommerce:children]
lb
web
app
db
cache
nfs

# SSH settings applied to every host
[ecommerce:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/ecommerce_key
ansible_python_interpreter=/usr/bin/python3
