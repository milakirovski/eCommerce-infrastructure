---
# Variables for PostgreSQL hosts

postgresql_version: 14
postgresql_user: postgres
postgresql_group: postgres
postgresql_data_dir: "/var/lib/postgresql/{{ postgresql_version }}/main"
postgresql_config_path: "/etc/postgresql/{{ postgresql_version }}/main"

# geerlingguy.postgresql variables
postgresql_databases:
  - name: "{{ db_name }}"
    owner: "{{ db_user }}"

postgresql_users:
  - name: "{{ db_user }}"
    password: "{{ db_password }}"
    db: "{{ db_name }}"
    priv: ALL

# Replication user (used by db-replication role)
postgresql_replication_user: replicator
postgresql_replication_password: "repl_changeme_dev"

# Allow connections from app servers and from replica
postgresql_hba_entries:
  - type: local
    database: all
    user: postgres
    auth_method: peer
  - type: host
    database: all
    user: "{{ db_user }}"
    address: "192.168.100.0/24"
    auth_method: scram-sha-256
  - type: host
    database: replication
    user: "{{ postgresql_replication_user }}"
    address: "192.168.100.0/24"
    auth_method: scram-sha-256
