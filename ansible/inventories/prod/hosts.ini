# Production inventory — matches terraform/environments/prod/main.tf IPs

[lb]
lb1 ansible_host=192.168.200.10
lb2 ansible_host=192.168.200.11

[web]
web1 ansible_host=192.168.200.20
web2 ansible_host=192.168.200.21
web3 ansible_host=192.168.200.22

[app]
app1 ansible_host=192.168.200.30
app2 ansible_host=192.168.200.31
app3 ansible_host=192.168.200.32

[db_primary]
db1 ansible_host=192.168.200.40

[db_replica]
db2 ansible_host=192.168.200.41

[db:children]
db_primary
db_replica

[cache]
cache1 ansible_host=192.168.200.50
cache2 ansible_host=192.168.200.51

[ecommerce:children]
lb
web
app
db
cache

[ecommerce:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/ecommerce_key
ansible_python_interpreter=/usr/bin/python3
